<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskly Pro | Cozy Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.5);
            --text: #2d3436;
            --muted: #636e72;
            --accent: #dcd6f7;
            --prio-low: #e2f0cb;
            --prio-med: #b5ead7;
            --prio-high: #ffdac1;
            --prio-crit: #ff9aa2;
        }

        body {
            /* תמונה נוצתית עדינה ומרחפת */
background-image: url('https://i.pinimg.com/736x/c8/f6/00/c8f6008857d9ceeb183e545c3a66b436.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Plus Jakarta Sans', 'Assistant', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dashboard {
            width: 90%;
            max-width: 1100px;
            height: 82vh;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            display: flex;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            overflow: hidden;
        }

        /* חלוקת מסך נקייה */
        .side-panel {
            width: 340px;
            padding: 50px;
            background: rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
        }

        .main-panel {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
        }

        .logo { font-size: 1.8rem; font-weight: 700; color: var(--text); margin-bottom: 35px; }
        .logo i { color: #a6b1e1; margin-left: 10px; }

        input, textarea, select {
            width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.7);
            font-family: inherit; outline: none; box-sizing: border-box; transition: 0.3s;
        }

        input:focus { background: white; border-color: var(--accent); }

        .btn-add {
            background: linear-gradient(135deg, #a6b1e1, #dcd6f7);
            color: white; border: none; padding: 18px; border-radius: 20px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(166, 177, 225, 0.2);
        }

        .btn-add:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(166, 177, 225, 0.3); }

        /* רשימת משימות */
        .task-list { flex: 1; overflow-y: auto; padding-left: 15px; }

        .task-card {
            background: rgba(255, 255, 255, 0.65);
            padding: 24px; border-radius: 30px; margin-bottom: 18px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.3); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .task-card:hover { transform: scale(1.02) translateX(-5px); background: white; }

        .prio-mark { width: 10px; height: 10px; border-radius: 50%; }
        .prio-LOW { background: var(--prio-low); }
        .prio-MEDIUM { background: var(--prio-med); }
        .prio-HIGH { background: var(--prio-high); }
        .prio-CRITICAL { background: var(--prio-crit); }

        .task-content h3 { margin: 0; font-size: 1.1rem; color: var(--text); }
        .task-content p { margin: 5px 0 0; font-size: 0.85rem; color: var(--muted); }

        .is-done { opacity: 0.4; filter: grayscale(0.5); }
        .is-done h3 { text-decoration: line-through; }

        .btn-action {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: white; color: var(--muted); text-decoration: none; transition: 0.3s;
        }
        .btn-action:hover { color: #a6b1e1; transform: rotate(15deg); }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="side-panel">
        <div class="logo"><i class="fas fa-feather-pointed"></i><span>Taskly</span></div>
        <form action="/add_task" method="POST">
            <input type="text" name="title" placeholder="כותרת המשימה..." required>
            <textarea name="description" placeholder="תיאור קטן..." rows="2"></textarea>
            <select name="priority">
                <option value="LOW">עדיפות רכה 🍃</option>
                <option value="MEDIUM" selected>עדיפות רגילה ☁️</option>
                <option value="HIGH">עדיפות גבוהה ✨</option>
                <option value="CRITICAL">קריטית 🔥</option>
            </select>
            <button type="submit" class="btn-add">להוסיף לענן</button>
        </form>
    </div>

    <div class="main-panel">
        <div class="task-list" id="taskList"></div>
    </div>
</div>

<script>
    async function load() {
        try {
            const r = await fetch('/tasks');
            const data = await r.json();
            const list = document.getElementById('taskList');
            list.innerHTML = data.map(t => {
                const done = t.status === 'completed';
                return `
                <div class="task-card ${done ? 'is-done' : ''}">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div class="prio-mark prio-${t.priority}"></div>
                        <div class="task-content">
                            <h3>${t.title}</h3>
                            <p>${t.description || ''}</p>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <a href="/update_status/${t.task_id}/${done ? 'pending' : 'completed'}" class="btn-action">
                            <i class="fas ${done ? 'fa-undo' : 'fa-check'}"></i>
                        </a>
                        <a href="/delete_task/${t.task_id}" class="btn-action"><i class="fas fa-times"></i></a>
                    </div>
                </div>
            `}).join('');
        } catch(e) {}
    }
    load(); setInterval(load, 3000);
</script>

</body>
</html>
